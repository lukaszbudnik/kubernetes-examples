##############################################################################
# tenant-a  –  frontend and backend deployments + services
##############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: tenant-a
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: tenant-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
      app.kubernetes.io/part-of: tenant-a
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: tenant-a
    spec:
      containers:
        - name: yosoy
          image: ghcr.io/lukaszbudnik/yosoy:latest
          ports:
            - name: http
              containerPort: 80
          env:
            - name: YOSOY_SHOW_ENVS
              value: "true"
            - name: TENANT
              value: "tenant-a"
            - name: SERVICE_TYPE
              value: "frontend"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
      securityContext:
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: tenant-a
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: tenant-a
spec:
  selector:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: tenant-a
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: tenant-a
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: tenant-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
      app.kubernetes.io/part-of: tenant-a
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: tenant-a
    spec:
      containers:
        - name: yosoy
          image: ghcr.io/lukaszbudnik/yosoy:latest
          ports:
            - name: http
              containerPort: 80
          env:
            - name: YOSOY_SHOW_ENVS
              value: "true"
            - name: TENANT
              value: "tenant-a"
            - name: SERVICE_TYPE
              value: "backend"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
      securityContext:
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: tenant-a
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: tenant-a
spec:
  selector:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: tenant-a
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
---
