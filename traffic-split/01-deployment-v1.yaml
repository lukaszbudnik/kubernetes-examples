##############################################################################
# Deployment – version A (stable)
#
# yosoy exposes port 80 and returns JSON describing its runtime environment.
# YOSOY_SHOW_ENVS lets it echo back env vars so we can confirm which version
# the Gateway is routing to without any extra tooling.
##############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yosoy-v1
  namespace: ab-demo
  labels:
    app.kubernetes.io/name: yosoy
    app.kubernetes.io/version: v1
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: ab-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: yosoy
      app.kubernetes.io/version: v1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yosoy
        app.kubernetes.io/version: v1
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: ab-demo
    spec:
      # Prevent all pods from landing on the same node
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: yosoy
              app.kubernetes.io/version: v1
      containers:
        - name: yosoy
          image: ghcr.io/lukaszbudnik/yosoy:latest
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: YOSOY_SHOW_ENVS
              value: "true"
            # Expose Downward API fields so the response clearly shows the version
            - name: APP_VERSION
              value: "v1"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
      securityContext:
        seccompProfile:
          type: RuntimeDefault
